<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Cancelled — FocusGuard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #080b12;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 250px;
            background: radial-gradient(ellipse, rgba(251, 146, 60, 0.1), transparent 70%);
            pointer-events: none;
        }

        .card {
            background: #0d1120;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 56px 48px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -0.8px;
            margin-bottom: 12px;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            line-height: 1.65;
            margin-bottom: 32px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-primary {
            display: block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.55);
        }

        .btn-ghost {
            display: block;
            padding: 14px 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #64748b;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-ghost:hover {
            border-color: rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            margin-bottom: 32px;
            font-weight: 800;
            font-size: 1rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div class="glow"></div>
    <div class="logo">
        <div class="logo-icon">⚡</div>
        FocusGuard
    </div>
    <div class="card">
        <span class="icon">🔙</span>
        <h1>Payment cancelled</h1>
        <p>No worries — you haven't been charged. You can upgrade to Premium whenever you're ready. Free features are
            still yours.</p>
        <div class="actions">
            <a href="index.html#pricing" class="btn-primary">See plans again →</a>
            <a href="index.html" class="btn-ghost">Back to homepage</a>
        </div>
    </div>
</body>

</html>
